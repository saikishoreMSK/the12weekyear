spring:
  application:
    name: the-12-week-year-backend

  datasource:
    # Env-driven so the same build runs locally and against Supabase by swapping env vars only.
    url: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require
    username: postgres.ucyfpxgqivwrbasmmmij
    password: Saikishore@1634
    driver-class-name: org.postgresql.Driver
    hikari:
      # Don't fail startup if the DB is unreachable; connections are acquired lazily on first use.
      # This lets the app boot for the health check before Supabase credentials are wired in.
      initialization-fail-timeout: -1

  jpa:
    open-in-view: false
    hibernate:
      # `update` for early development convenience. We will switch to `validate` + Flyway
      # migrations before the first real schema lands (planned for the Auth phase).
      ddl-auto: ${JPA_DDL_AUTO:update}
    # Explicit dialect + disabling JDBC metadata probing means Hibernate does not touch the DB
    # at boot, so the app starts cleanly even with no database connected yet.
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        boot:
          allow_jdbc_metadata_access: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Application-specific configuration.
app:
  cors:
    # Comma-separated list of browser origins allowed to call the API.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    # HS256 signing secret. MUST be overridden in production and be at least 32 bytes.
    jwt-secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-in-production-0123456789}
    # Simple duration format: s, m, h, d.
    access-token-ttl: ${ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:30d}
