spring:
  application:
    name: the-12-week-year-backend

  datasource:
    # Env-driven: never hardcode credentials here. Set DATABASE_* in the environment
    # (.env locally, dashboard env vars on Render). The localhost values are dev-only defaults.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/twelveweekyear}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      # `update` lets Hibernate create/evolve the schema in dev and on first deploy.
      # Switch to `validate` + Flyway migrations before production hardening.
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true

server:
  # Render injects PORT; fall back to SERVER_PORT, then 8080 for local runs.
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Application-specific configuration.
app:
  cors:
    # Comma-separated list of browser origins allowed to call the API (set to your deployed
    # frontend URL in production).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    # HS256 signing secret. MUST be overridden via JWT_SECRET in production (>= 32 bytes).
    jwt-secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-in-production-0123456789}
    # Simple duration format: s, m, h, d.
    access-token-ttl: ${ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:30d}
