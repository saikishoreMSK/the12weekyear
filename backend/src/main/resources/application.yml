spring:
  application:
    name: the-12-week-year-backend

  datasource:
    # Env-driven: never hardcode credentials here. Set DATABASE_* in the environment
    # (.env locally, dashboard env vars on Render). The localhost values are dev-only defaults.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/twelveweekyear}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema now; Hibernate only validates that the entities match it.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true

  flyway:
    # An existing database (previously managed by ddl-auto) is baselined at V1 and left untouched;
    # a fresh database gets the full schema from V1. New changes go in V2, V3, ... migrations.
    baseline-on-migrate: true

server:
  # Render injects PORT; fall back to SERVER_PORT, then 8080 for local runs.
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Application-specific configuration.
app:
  cors:
    # Comma-separated list of browser origins allowed to call the API (set to your deployed
    # frontend URL in production).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    # HS256 signing secret. MUST be overridden via JWT_SECRET in production (>= 32 bytes).
    jwt-secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-in-production-0123456789}
    # Simple duration format: s, m, h, d.
    access-token-ttl: ${ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:30d}
  otp:
    length: ${OTP_LENGTH:6}
    expiry: ${OTP_EXPIRY:5m}
    resend-cooldown: ${OTP_RESEND_COOLDOWN:120s}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
  email:
    # "log" prints the OTP to the server console (dev). Set to "resend" with an API key in prod.
    provider: ${EMAIL_PROVIDER:log}
    from: ${MAIL_FROM:The 12 Week Year <onboarding@resend.dev>}
    resend-api-key: ${RESEND_API_KEY:}
